<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>与謝野クリッカー</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="apple-touch-icon" href="icon192x192.png">
    <link rel="icon" href="icon192x192.png">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="main-game-container">
<div id="header">
    <div id="yosano-count">0 与謝野</div>
    <div id="yosano-cps">毎秒: 0.0 与謝野</div>
</div>

<div id="main-stage">
    <div id="facility-visuals"></div>
    <div id="akiko-btn"></div>
</div>

<div id="controls">
    <button onclick="Game.saveToJSON()">JSON保存</button>
    <button onclick="Game.loadFromJSON()">JSON読込</button>
    <button class="danger" onclick="Game.hardReset()">データ削除</button>
    <button class="special" onclick="Game.openPrestige()">みだれ髪へ転生</button>
    <button onclick="Game.openMarket()" style="border-color: var(--neon-blue); color: var(--neon-blue);">株式市場</button>
</div>

<div id="shop"></div>
</div>

<div id="market-modal" class="modal">
    <div class="modal-content" style="width: 95%; max-width: 1000px;">
        <h2>情熱の株式市場</h2>
        <div id="market-info" style="margin-bottom: 10px; color: var(--neon-blue);">次回更新までお待ちください...</div>
        <div id="stock-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; max-height: 60vh; overflow-y: auto;">
            <!-- Stocks injected here -->
        </div>
        <button class="special" style="font-size: 1.2rem; margin-top: 20px;" onclick="Game.closeMarket()">市場を閉じる</button>
    </div>
</div>

<div id="prestige-modal" class="modal">
    <div class="modal-content">
        <h2>転生（PRESTIGE）</h2>
        <p>現在の与謝野を全て放棄して、情熱ポイントを獲得します。</p>
        <p>情熱ポイントを使ってスキルを購入できます。</p>
        <div id="prestige-gain-display">獲得予定: 0 pt</div>
        <div id="prestige-current-display">現在の情熱: 0 pt</div>
        <button class="special" style="font-size: 1.5rem; margin-top: 20px;" onclick="Game.doPrestige()">転生する！</button>
        <button onclick="document.getElementById('prestige-modal').style.display='none'" style="margin-top: 10px;">キャンセル</button>
    </div>
</div>

<div id="skill-shop-modal" class="modal">
    <div class="modal-content" style="width: 95%; max-width: 1000px; height: 90vh; display: flex; flex-direction: column; padding: 10px;">
        <div style="flex-shrink: 0;">
            <h2>情熱のスキルショップ</h2>
            <div id="skill-shop-points" style="font-size: 1.5rem; color: var(--neon-green); margin-bottom: 10px;">情熱ポイント: 0 pt</div>
        </div>
        
        <div id="skill-list" style="flex: 1; position: relative; overflow: auto; background: #111; border: 2px solid #555; margin-bottom: 10px;">
            <!-- Tree container injected here -->
        </div>

        <div id="skill-details-panel" style="flex-shrink: 0; height: 150px; background: #222; border: 2px solid var(--neon-pink); padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 5px;">
            <div id="skill-detail-name" style="color: var(--neon-yellow); font-size: 1.2rem; font-weight: bold;">スキルを選択してください</div>
            <div id="skill-detail-desc" style="color: #ddd; margin: 5px 0;">アイコンをタップして詳細を表示</div>
            <div id="skill-detail-cost" style="color: var(--neon-pink); font-weight: bold; margin-bottom: 5px;"></div>
            <button id="skill-detail-btn" class="special" style="display: none;" onclick="Game.buySelectedSkill()">取得する</button>
        </div>
        
        <button class="special" style="font-size: 1.2rem; margin-top: 10px; flex-shrink: 0;" onclick="Game.closeSkillShop()">転生完了（ゲーム開始）</button>
    </div>
</div>

<input type="file" id="file-input" style="display: none;" accept=".json">

<script src="src/script.js"></script>
</body>
</html>
